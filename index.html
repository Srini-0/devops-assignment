<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS DevOps Assignment</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 40px 50px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    max-width: 480px;
    width: 90%;
  }
  h1 {
    color: #38bdf8;
    font-size: 1.8rem;
    margin-bottom: 5px;
  }
  .subtitle {
    color: #94a3b8;
    font-size: 0.95rem;
    margin-bottom: 25px;
  }
  .detail {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #334155;
  }
  .detail:last-child { border-bottom: none; }
  .label {
    color: #94a3b8;
    font-weight: 600;
  }
  .value {
    color: #f1f5f9;
    text-align: right;
  }
  .badge {
    display: inline-block;
    margin-top: 25px;
    background: #0ea5e9;
    color: #fff;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.8rem;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Deployed on AWS EC2</h1>
    <p class="subtitle">AWS DevOps Engineer Intern Assignment</p>

    <div class="detail"><span class="label">Name</span><span class="value">Srinivasalu</span></div>
    <div class="detail"><span class="label">College</span><span class="value">Vels University (VISTAS)</span></div>
    <div class="detail"><span class="label">Branch</span><span class="value">BCA (Arts and Sciences)</span></div>
    <div class="detail"><span class="label">Email</span><span class="value">srinivj46@gmail.com</span></div>
    <div class="detail"><span class="label">Date</span><span class="value">10-07-2026</span></div>

    <span class="badge">Hosted via Nginx on Ubuntu EC2</span>
  </div>
</body>
</html>
